<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/javascript/js css/dom.css" />
  </head>
  <body>
    <!-- dom manipulation strt -->
    <h1 id="myid">document object model</h1>
    <h4 class="myclass">this is heading level 4</h4>
    <p class="myclass">this is paragraph</p>
    <button>click me</button>

    <!-- dom properties -->
    <div class="prop">
      <h2>fruits</h2>
      <ul>
        <li>mango</li>
        <li>apple</li>
        <li>litci</li>
      </ul>
    </div>

    <!--Create 3 divs with common class name - “box” , Access them & add some unique text to each of them -->
    <div class="div">div1</div>
    <div class="div">div2</div>
    <div class="div">div3</div>

    <!-- dom attributes -->
    <div id="attr">this is a div</div>
    <h1>this is on heading</h1>
    <div id="div2">
      <h4 id="heading">fruits</h4>
      <ul>
        <li id="listitem">apple</li>
        <li>mango</li>
      </ul>
    </div>

    <!-- qs2 -->
    <p class="old">this is paragraph</p>

    <script src="/javascript/learning js/dom.js"></script>
  </body>
</html>
