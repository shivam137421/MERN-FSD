<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Clone</title>
  <style>
    
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
      color: #333;
    }

    
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
      background-color: #fff;
      border-bottom: 1px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      text-decoration: none;
      color: #333;
      margin: 0 10px;
      font-weight: 500;
      font-size: 14px;
    }

    nav a:hover {
      color: #0071e3;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 20px;
      background-image: url('https://www.apple.com/v/home/ai/images/heroes/iphone-14-pro/hero/iphone_14_pro_hero__c5b6x1nbx0qe_large_2x.jpg');
      background-size: cover;
      background-position: center;
      color: white;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .hero button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background-color: #0071e3;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .hero button:hover {
      background-color: #005bb5;
    }

    
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 50px 20px;
      gap: 20px;
    }

    .product-card {
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.3s;
    }

    .product-card:hover {
      transform: scale(1.05);
    }

    .product-card img {
      width: 100%;
      height: auto;
    }

    .product-card h3 {
      margin: 15px 0 10px;
      font-size: 20px;
    }

    .product-card p {
      margin-bottom: 15px;
      color: #666;
    }

    .product-card button {
      margin-bottom: 20px;
      padding: 10px 20px;
      border: none;
      background-color: #0071e3;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .product-card button:hover {
      background-color: #005bb5;
    }

    
    footer {
      background-color: #f5f5f7;
      padding: 30px 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 50px;
    }

    
    @media(max-width: 768px) {
      nav {
        flex-direction: column;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero p {
        font-size: 16px;
      }

      .products {
        flex-direction: column;
        align-items: center;
      }

      .product-card {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  
  <nav>
    <div class="logo"> Apple</div>
    <div class="nav-links">
      <a href="#">Mac</a>
      <a href="#">iPad</a>
      <a href="#">iPhone</a>
      <a href="#">Watch</a>
      <a href="#">AirPods</a>
      <a href="#">TV & Home</a>
      <a href="#">Support</a>
    </div>
  </nav>

 
  <section class="hero">
    <h1>iPhone 14 Pro</h1>
    <p>Pro. Beyond.</p>
    <button>Learn More</button>
  </section>

  <!-- Product Section -->
  <section class="products">
    <div class="product-card">
      <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/macbook-pro-14-spacegray-select-202301?wid=2000&hei=2000&fmt=jpeg&qlt=80&.v=1671683369020" alt="MacBook Pro">
      <h3>MacBook Pro</h3>
      <p>Supercharged by M2 Pro and M2 Max.</p>
      <button>Buy</button>
    </div>

    <div class="product-card">
      <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/ipad-pro-11-select-202304?wid=2000&hei=2000&fmt=jpeg&qlt=80&.v=1680930590800" alt="iPad Pro">
      <h3>iPad Pro</h3>
      <p>Supercharged by M2 chip.</p>
      <button>Buy</button>
    </div>

    <div class="product-card">
      <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-pro-space-select-202209?wid=2000&hei=2000&fmt=jpeg&qlt=80&.v=1660753619946" alt="iPhone 14 Pro">
      <h3>iPhone 14 Pro</h3>
      <p>The ultimate iPhone experience.</p>
      <button>Buy</button>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    &copy; 2025 Apple Inc. All rights reserved.
  </footer>

</body>
</html>
