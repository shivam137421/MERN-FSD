<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container with Boxes</title>
  <style>
    .container {
      background-color: #23ecbdb8;
      padding: 30px;
      border-radius: 15px;
      display: grid;
      height: 750px;
      width: 750px;
      grid-template-rows: 190px 190px ;
      grid-template-columns: 190px 190px ;
      border: 10px;
    }

    .box {
      width: 150px;
      height: 150px;
      background-color: #4a90e2;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgb(94, 88, 84);
      font-weight: bold;
      font-size: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      margin-bottom: 30px;
      shakishalni singh
      
    }
    

  </style>
</head>
<body>
  <div class="container">
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
    <div class="box" id="box4"></div>
    
  </div>
</body>
</html>
